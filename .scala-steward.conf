# sbt-kubuszok cross-publishes itself for sbt 1.x (Scala 2.12) AND sbt 2.0 (Scala 3.8.4), driven by
# an sbt 1.x meta-build.
#
# Stay on sbt 1.x: build.properties must remain on the 1.x line to drive the cross-build (an sbt 2.0
# meta-build can't cross-publish the 1.x axis).
updates.pin = [
  { groupId="org.scala-sbt", artifactId="sbt", version="1." }
]
# The 2.12 and 3.8.4 axes are dictated by the sbt versions they target (sbt 1.x -> Scala 2.12,
# sbt 2.0 -> Scala 3.8.4) and must not move independently. Scala Steward does not respect
# updates.pin for Scala versions, so ignore the Scala libs and bump them by hand if ever needed.
updates.ignore = [
  { groupId="org.scala-lang", artifactId="scala-library" },
  { groupId="org.scala-lang", artifactId="scala-compiler" },
  { groupId="org.scala-lang", artifactId="scala-reflect" },
  { groupId="org.scala-lang", artifactId="scala3-library" }
]
pullRequests.grouping = [
  { name="scala-versions", "title"="Scala compiler updates", "filter"=[{"group" = "org.scala-lang"}, {"group" = "org.scoverage"}] }
]
